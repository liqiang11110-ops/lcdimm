<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>娟姐成本核算</title>
<meta name="theme-color" content="#1d4e7e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="娟姐成本核算">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/cost-management/manifest.webmanifest">
<link rel="icon" href="/cost-management/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/cost-management/apple-touch-icon.png">
<style>
:root{--bg:#f3f7fc;--card:#fff;--ink:#16233a;--muted:#64748b;--line:#e3ebf5;--navy:#1d4e7e;--blue:#2f7fce;--green:#15915a;--red:#c0392b;--shadow:0 16px 44px -24px rgba(20,45,90,.45)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;background:radial-gradient(1000px 420px at 80% -140px,#dcebfb 0%,rgba(220,235,251,0) 70%),linear-gradient(180deg,#eef4fb 0%,#f7fafe 360px);color:var(--ink)}
.top{height:72px;background:linear-gradient(120deg,#143d63 0%,#2f7fce 78%,#4a93da 100%);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 10px 30px -18px rgba(20,45,90,.55)}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:21px}
.brand i{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:inline-flex;align-items:center;justify-content:center;font-style:normal}
.sub{font-size:12px;opacity:.86;text-align:right}
.wrap{max-width:1260px;margin:0 auto;padding:28px}
.login{max-width:420px;margin:90px auto 0;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow)}
.login h1{font-size:22px;color:var(--navy);margin-bottom:8px}
.login p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:8px}
input{width:100%;height:48px;border:1.5px solid var(--line);border-radius:12px;background:#f8fafd;padding:0 14px;font-size:16px;color:var(--ink);outline:none}
input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px #e9f2fc}
.actions{display:flex;gap:10px;margin-top:16px}
button{border:none;border-radius:12px;height:46px;padding:0 18px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit}
.primary{background:var(--navy);color:#fff;flex:1;box-shadow:0 10px 22px -14px rgba(29,78,126,.75)}
.ghost{background:#e8eef6;color:#42526a}
button:disabled{background:#d7dee8;color:#7b8794;cursor:not-allowed;box-shadow:none}
.msg{min-height:22px;margin-top:12px;font-size:12px;font-weight:800;color:var(--muted)}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
.appbar{display:none;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;color:var(--muted);font-size:13px}
.appframe{display:none;width:100%;min-height:calc(100vh - 130px);border:none;border-radius:18px;background:#fff;box-shadow:var(--shadow)}
.loading{display:none;background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;color:var(--muted);box-shadow:var(--shadow)}
body.loaded .login,body.loaded .loading{display:none}
body.loaded .appbar{display:flex}
body.loaded .appframe{display:block}
@media(max-width:680px){.top{height:auto;min-height:68px;padding:16px 18px;align-items:flex-start;gap:10px;flex-direction:column}.sub{text-align:left}.wrap{padding:16px}.login{margin-top:40px;padding:22px}.appframe{min-height:calc(100vh - 130px);border-radius:12px}}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><i>娟</i><span>娟姐成本核算</span></div>
  <div class="sub">安全版 · 登录后从后端加载内部数据</div>
</header>
<main class="wrap">
  <section class="login" id="loginBox">
    <h1>访问验证</h1>
    <p>外网只保留登录入口；成本数据、板型规则和发送接口登录后由 CloudBase 函数返回。</p>
    <label for="password">访问口令</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="请输入口令">
    <div class="actions">
      <button class="primary" id="loginBtn" type="button">进入</button>
    </div>
    <div class="msg" id="msg"></div>
  </section>
  <section class="loading" id="loading">正在加载成本核算工具...</section>
  <div class="appbar" id="appbar">
    <span>已登录，本页不在公开 HTML 中暴露业务数据。</span>
    <button class="ghost" id="logoutBtn" type="button">退出</button>
  </div>
  <iframe class="appframe" id="appFrame" title="娟姐成本核算"></iframe>
</main>
<script>
(function(){
  const API_ORIGIN='https://d5-d2gzyrjkz1d3d265f-1437410927.ap-shanghai.app.tcloudbase.com';
  const TOKEN_KEY='d5_cost_auth_token';
  const $=(id)=>document.getElementById(id);
  const msg=$('msg');
  function setMsg(text,type){msg.textContent=text||'';msg.className='msg '+(type||'');}
  function injectToken(html,token){
    const seed='<script>try{sessionStorage.setItem("'+TOKEN_KEY+'",'+JSON.stringify(token)+')}catch(e){}<\/script>';
    return html.includes('</head>') ? html.replace('</head>',seed+'</head>') : seed+html;
  }
  async function loadApp(token){
    $('loading').style.display='block';
    const res=await fetch(API_ORIGIN+'/api/cost-app',{headers:{'x-ddr5-auth-token':token},cache:'no-store'});
    if(!res.ok) throw new Error(res.status===401?'登录已失效，请重新输入口令':'工具加载失败：'+res.status);
    const html=await res.text();
    document.open();
    document.write(injectToken(html,token));
    document.close();
  }
  async function login(){
    const password=$('password').value;
    if(!password){setMsg('请输入口令','err');return;}
    $('loginBtn').disabled=true;setMsg('正在验证...','');
    try{
      const res=await fetch(API_ORIGIN+'/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({password}),cache:'no-store'});
      const data=await res.json().catch(()=>({}));
      if(!res.ok||!data.token) throw new Error(data.error||'登录失败');
      sessionStorage.setItem(TOKEN_KEY,data.token);
      setMsg('验证通过，正在加载...','ok');
      await loadApp(data.token);
    }catch(error){
      sessionStorage.removeItem(TOKEN_KEY);
      setMsg(error.message||'连接失败，请稍后重试','err');
    }finally{
      $('loginBtn').disabled=false;
    }
  }
  $('loginBtn').addEventListener('click',login);
  $('password').addEventListener('keydown',(event)=>{if(event.key==='Enter')login();});
  $('logoutBtn').addEventListener('click',()=>{sessionStorage.removeItem(TOKEN_KEY);location.reload();});
  const token=sessionStorage.getItem(TOKEN_KEY);
  if(token) loadApp(token).catch((error)=>{sessionStorage.removeItem(TOKEN_KEY);setMsg(error.message,'err');});
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/cost-management/sw.js',{scope:'/cost-management/'}).catch(()=>{});
  }
})();
</script>
</body>
</html>
